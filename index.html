<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HLS Player</title>
  <link href="style.css" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.23.4/video-js.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.23.4/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="video-player">
    <video id="my-player" class="video-js" controls preload="auto" width="1920" height="1080">
      <source src="http://localhost:80/hls/master.m3u8" type="application/x-mpegURL">
    </video>
  </div>

  <div class="dashboard">
    <h2 class="dashboard-title">ABR Metrics — Real-time</h2>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Quality Level</h3>
        <canvas id="chart-quality"></canvas>
      </div>
      <div class="chart-card">
        <h3>Bandwidth (Mbps)</h3>
        <canvas id="chart-bandwidth"></canvas>
      </div>
      <div class="chart-card">
        <h3>Buffer (seconds ahead)</h3>
        <canvas id="chart-buffer"></canvas>
      </div>
    </div>

    <h2 class="dashboard-title" style="margin-top: 40px">Cache Metrics</h2>
    <div class="charts-grid" style="grid-template-columns: 300px 1fr">
      <div class="chart-card cache-stats">
        <h3>Hit Rate</h3>
        <canvas id="chart-cache"></canvas>
        <div class="cache-numbers">
          <span class="cache-hit">HIT: <strong id="hit-count">0</strong></span>
          <span class="cache-miss">MISS: <strong id="miss-count">0</strong></span>
          <span class="cache-rate">Rate: <strong id="hit-rate">0%</strong></span>
        </div>
      </div>
      <div class="chart-card">
        <h3>Requests over time (HIT / MISS)</h3>
        <canvas id="chart-cache-timeline"></canvas>
      </div>
    </div>
  </div>
</body>

<script>
  // ---------------------------------------------------------------------------
  // Metrics store
  // MAX_POINTS caps history to avoid unbounded memory growth.
  // At a 5s polling interval, 60 points = last 5 minutes of data.
  // ---------------------------------------------------------------------------
  const MAX_POINTS = 60;

  const metrics = {
    timestamps: [],  // x-axis labels (HH:MM:SS strings)
    quality: [],     // resolution height in px (360, 480, 720, 1080)
    bandwidth: [],   // estimated bandwidth in Mbps
    buffer: [],      // seconds of video buffered ahead of playhead
  };

  // ---------------------------------------------------------------------------
  // Chart factory — creates a line chart with a single dataset.
  // Each chart shares the same config shape; only labels and colors differ.
  // ---------------------------------------------------------------------------
  function createChart(canvasId, label, color, yConfig = {}) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    return new Chart(ctx, {
      type: 'line',
      data: {
        labels: metrics.timestamps,
        datasets: [{
          label,
          data: [],
          borderColor: color,
          backgroundColor: color + '22', // hex color + low-opacity fill
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.3,  // slight curve on the line (0 = sharp, 1 = very smooth)
          fill: true,
        }]
      },
      options: {
        animation: false,  // skip animation on update for real-time feel
        responsive: true,
        plugins: {legend: {display: false}},
        scales: {
          x: {ticks: {maxTicksLimit: 8}},
          y: {beginAtZero: true, ...yConfig},
        }
      }
    });
  }

  // Quality y-axis maps numeric height to a resolution label (360 → "360p").
  const qualityChart = createChart('chart-quality', 'Quality', '#e50914', {
    ticks: {callback: v => v ? v + 'p' : ''},
    suggestedMax: 1080,
  });

  const bandwidthChart = createChart('chart-bandwidth', 'Bandwidth', '#f5a623', {
    suggestedMax: 10,
  });

  const bufferChart = createChart('chart-buffer', 'Buffer', '#4a90e2', {
    suggestedMax: 30,
  });

  // ---------------------------------------------------------------------------
  // Cache hit rate tracking
  // ---------------------------------------------------------------------------
  const cacheStats = {hits: 0, misses: 0};

  // Doughnut chart showing overall HIT vs MISS ratio.
  const cacheDonutChart = new Chart(
    document.getElementById('chart-cache').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['HIT', 'MISS'],
      datasets: [{
        data: [0, 0],
        backgroundColor: ['#4a90e2', '#e50914'],
        borderWidth: 0,
      }]
    },
    options: {
      animation: false,
      plugins: {legend: {position: 'bottom', labels: {color: '#ccc'}}},
    }
  }
  );

  // Timeline showing cumulative HITs and MISSes over time.
  const cacheTimelineChart = new Chart(
    document.getElementById('chart-cache-timeline').getContext('2d'), {
    type: 'line',
    data: {
      labels: metrics.timestamps,  // shares the same x-axis as ABR charts
      datasets: [
        {
          label: 'HIT',
          data: [],
          borderColor: '#4a90e2',
          backgroundColor: '#4a90e222',
          borderWidth: 2,
          tension: 0.3,
          fill: true,
        },
        {
          label: 'MISS',
          data: [],
          borderColor: '#e50914',
          backgroundColor: '#e5091422',
          borderWidth: 2,
          tension: 0.3,
          fill: true,
        }
      ]
    },
    options: {
      animation: false,
      responsive: true,
      scales: {
        x: {ticks: {maxTicksLimit: 8}},
        y: {beginAtZero: true},
      }
    }
  }
  );

  // Timeline buckets — counts per polling interval (reset each tick).
  let intervalHits = 0;
  let intervalMisses = 0;

  // Called by recordMetrics to flush interval counts into the timeline chart.
  function flushCacheTimeline() {
    cacheTimelineChart.data.datasets[0].data.push(intervalHits);
    cacheTimelineChart.data.datasets[1].data.push(intervalMisses);

    if (cacheTimelineChart.data.datasets[0].data.length > MAX_POINTS) {
      cacheTimelineChart.data.datasets[0].data.shift();
      cacheTimelineChart.data.datasets[1].data.shift();
    }

    intervalHits = 0;
    intervalMisses = 0;
    cacheTimelineChart.update();
  }

  // ---------------------------------------------------------------------------
  // recordCacheHit — called for every .ts segment request intercepted.
  // Updates cacheStats, the doughnut chart, and the counters in the DOM.
  //
  // TODO(human): implement this function.
  // Parameters:
  //   isHit — true if X-Cache-Status was "HIT", false if "MISS"
  // ---------------------------------------------------------------------------
  function recordCacheHit(isHit) {
    if (isHit) {
      cacheStats.hits++;
      intervalHits++;
    } else {
      cacheStats.misses++;
      intervalMisses++;
    }

    const total = cacheStats.hits + cacheStats.misses;
    const rate = total > 0 ? (cacheStats.hits / total * 100).toFixed(1) : 0;
    document.getElementById('hit-count').textContent = cacheStats.hits;
    document.getElementById('miss-count').textContent = cacheStats.misses;
    document.getElementById('hit-rate').textContent = rate + '%';

    cacheDonutChart.data.datasets[0].data = [cacheStats.hits, cacheStats.misses];
    cacheDonutChart.update();
  }

  // ---------------------------------------------------------------------------
  // XHR interceptor — wraps the native XMLHttpRequest to observe every
  // request VHS makes internally, without modifying Video.js itself.
  // ---------------------------------------------------------------------------
  const _open = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function (method, url, ...args) {
    this._requestUrl = url;
    return _open.call(this, method, url, ...args);
  };

  const _send = XMLHttpRequest.prototype.send;
  XMLHttpRequest.prototype.send = function (...args) {
    this.addEventListener('load', () => {
      // Only track .ts segment requests — ignore .m3u8, images, scripts, etc.
      if (this._requestUrl && this._requestUrl.endsWith('.ts')) {
        const status = this.getResponseHeader('X-Cache-Status');
        if (status) recordCacheHit(status === 'HIT');
      }
    });
    return _send.call(this, ...args);
  };

  // ---------------------------------------------------------------------------
  // recordMetrics — called on every polling interval with the latest values.
  // Pushes a new data point to each chart and trims old data when MAX_POINTS
  // is exceeded.
  // ---------------------------------------------------------------------------
  function recordMetrics(timestamp, quality, bandwidth, buffer) {
    metrics.timestamps.push(timestamp);
    metrics.quality.push(quality);
    metrics.bandwidth.push(bandwidth);
    metrics.buffer.push(buffer);

    Object.entries(metrics).forEach(([key, value]) => {
      if (metrics[key].length > MAX_POINTS) {
        metrics[key].shift();
      }
    })

    qualityChart.data.datasets[0].data = metrics.quality;
    bandwidthChart.data.datasets[0].data = metrics.bandwidth;
    bufferChart.data.datasets[0].data = metrics.buffer;

    qualityChart.update();
    bandwidthChart.update();
    bufferChart.update();
  }

  // ---------------------------------------------------------------------------
  // Video.js + VHS setup
  // ---------------------------------------------------------------------------
  const video = videojs('my-player', {
    html5: {vhs: {enableLowInitialPlaylist: true}}
  }, function () {
    console.log('Video.js player is ready');

    const tech = this.tech({IWillNotUseThisInPlugins: true});

    if (tech && tech.vhs) {
      setInterval(() => {
        // --- Collect raw values from VHS ----------------------------------
        if (video.paused()) return;

        const bandwidthMbps = tech.vhs.systemBandwidth
          ? tech.vhs.systemBandwidth / 1_000_000
          : 0;

        // buffered().end(0) is the furthest point buffered; subtract
        // currentTime to get how many seconds are buffered ahead.
        const bufferSec = video.buffered().length > 0
          ? Math.max(0, video.buffered().end(0) - video.currentTime())
          : 0;

        const currentPlaylist = tech.vhs.playlists.media();
        const qualityHeight = currentPlaylist?.attributes?.RESOLUTION?.height ?? 0;

        // HH:MM:SS label for the x-axis
        const timestamp = new Date().toLocaleTimeString();

        // Log to console (keeps existing behavior)
        console.log('=== ABR Status ===');
        console.log('Bandwidth:', bandwidthMbps.toFixed(2), 'Mbps');
        console.log('Buffer:', bufferSec.toFixed(1), 's');
        console.log('Quality:', qualityHeight + 'p');

        // --- Feed the dashboard -------------------------------------------
        recordMetrics(timestamp, qualityHeight, bandwidthMbps, bufferSec);
        flushCacheTimeline();
      }, 1000);

    } else {
      console.error('VHS not found on tech!');
    }
  });

  video.qualityLevels().on('change', function () {
    console.log('Quality changed to:', video.qualityLevels()[video.qualityLevels().selectedIndex]);
  });

  video.on('error', function (e) {
    console.error('Error occurred:', e);
  });
</script>

</html>
